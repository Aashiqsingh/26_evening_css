<style>
    *{
        margin: 0;
        padding: 0;
    }
    .box{
        height: 500px;
        width: 400px;
        border: 10px dotted darkblue;
        margin: auto;
        outline: 5px dashed darkblue;
        
    }
    .logo{
        height: 300px;
        
    }
    .logo img{
        height: 300px;
        width: 100%;
    }
    .para{
        height: 200px;
        background-color: blue;
    }
    .para h1{
        text-align: center;
        color: white;
        font-family: cursive;
        text-decoration: underline pink double;
    }
    .para p{
        text-align: center;
        color: white;
        font-size: 18px;
    }
</style>
<body>
    <br>
    
    <div class="box">
        <div class="logo">
            <img src="https://media.designcafe.com/wp-content/uploads/2020/08/19105548/simple-party-decoration-ideas-at-home.jpg" alt="">
        </div>
        <div class="para">
            <h1>Happy Birthday</h1>

            <p>

</html>
